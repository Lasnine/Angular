<div (click)="closeModal()" class="modal-bg">
    <div class="modal-container" (click)="$event.stopPropagation()">
        <div class="image">
            <img src="{{food.image}}" alt="">
        </div>
        <p class="title">{{food.name}}</p>
        <p class="price">R$ {{food.price}}</p>
        <button>COMPRAR</button>
    </div>
</div>
